# syntax=dhi.io/build:2-debian13

name: MinIO Server
image: ghcr.io/wellmaintained/minio
variant: runtime
tags:
  - latest
platforms:
  - linux/amd64

contents:
  packages:
    - base-files
    - ca-certificates
  builds:
    - name: minio-server
      uses: dhi.io/golang:1.26-alpine3.23-dev@sha256:0d916bcd9ca2060863389d96c8ea686d72e03ccc48ebf498be2150f21f720999
      contents:
        files:
          - url: "git+https://github.com/minio/minio.git#RELEASE.2025-10-15T17-29-55Z"
            path: ${source.dir}/minio
            spdx:
              name: minio
              version: "RELEASE.2025-10-15T17-29-55Z"
              packages:
                - name: minio
                  purl: "pkg:golang/github.com/minio/minio@RELEASE.2025-10-15T17-29-55Z"
                  license: AGPL-3.0-or-later
            uid: 0
            gid: 0
      pipeline:
        - name: build minio server
          work-dir: ${source.dir}/minio
          privileged: true
          runs: |
            set -eux -o pipefail
            go mod download
            CGO_ENABLED=0 go build \
              -tags kqueue \
              -trimpath \
              --ldflags "-s -w \
                -X github.com/minio/minio/cmd.Version=2025-10-15T17:29:55Z \
                -X github.com/minio/minio/cmd.CopyrightYear=2025 \
                -X github.com/minio/minio/cmd.ReleaseTag=RELEASE.2025-10-15T17-29-55Z \
                -X github.com/minio/minio/cmd.CommitID=9e49d5e7a648f00e26f2246f4dc28e6b07f8c84a \
                -X github.com/minio/minio/cmd.ShortCommitID=9e49d5e7a648" \
              -o minio
            mkdir -p ${target.dir}/usr/local/bin
            install -m 0755 minio ${target.dir}/usr/local/bin/minio
            mkdir -p ${target.dir}/data
            chown 65532:65532 ${target.dir}/data
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0
        - source: ${target.dir}/data
          target: /data
          uid: 65532
          gid: 65532

    - name: mc-client
      uses: dhi.io/golang:1.26-alpine3.23-dev@sha256:0d916bcd9ca2060863389d96c8ea686d72e03ccc48ebf498be2150f21f720999
      contents:
        files:
          - url: "git+https://github.com/minio/mc.git#RELEASE.2025-08-13T08-35-41Z"
            path: ${source.dir}/mc
            spdx:
              name: mc
              version: "RELEASE.2025-08-13T08-35-41Z"
              packages:
                - name: mc
                  purl: "pkg:golang/github.com/minio/mc@RELEASE.2025-08-13T08-35-41Z"
                  license: AGPL-3.0-or-later
            uid: 0
            gid: 0
      pipeline:
        - name: build mc client
          work-dir: ${source.dir}/mc
          privileged: true
          runs: |
            set -eux -o pipefail
            go mod download
            GO111MODULE=on CGO_ENABLED=0 go build \
              -trimpath \
              -tags kqueue \
              --ldflags "-s -w \
                -X github.com/minio/mc/cmd.Version=2025-08-13T08:35:41Z \
                -X github.com/minio/mc/cmd.CopyrightYear=2025 \
                -X github.com/minio/mc/cmd.ReleaseTag=RELEASE.2025-08-13T08-35-41Z \
                -X github.com/minio/mc/cmd.CommitID=7394ce0dd2a80935aded936b09fa12cbb3cb8096 \
                -X github.com/minio/mc/cmd.ShortCommitID=7394ce0dd2a8" \
              -o mc
            mkdir -p ${target.dir}/usr/local/bin
            install -m 0755 mc ${target.dir}/usr/local/bin/mc
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0

accounts:
  run-as: minio
  users:
    - name: minio
      uid: 65532
      gid: 65532
  groups:
    - name: minio
      gid: 65532
      members:
        - minio

annotations:
  org.opencontainers.image.description: A minimal MinIO S3-compatible object storage server with mc client
  org.opencontainers.image.licenses: AGPL-3.0-or-later

entrypoint:
  - /usr/local/bin/minio

cmd:
  - server
  - /data

ports:
  - 9000/tcp
  - 9001/tcp

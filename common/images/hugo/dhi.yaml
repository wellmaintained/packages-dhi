# syntax=dhi.io/build:2-alpine3.23

name: Hugo Static Site Generator
image: ghcr.io/wellmaintained/packages-dhi/hugo
variant: runtime
tags:
  - latest
  - "0.160.1"
platforms:
  - linux/amd64

contents:
  repositories:
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
    - https://dl-cdn.alpinelinux.org/alpine/v3.23/community
  packages:
    - alpine-baselayout-data
    - ca-certificates-bundle
    - git
    - libc6-compat
  builds:
    - name: hugo
      contents:
        repositories:
          - https://dl-cdn.alpinelinux.org/alpine/v3.23/main
        packages:
          - curl
          - ca-certificates
        files:
          - url: https://github.com/gohugoio/hugo/releases/download/v0.160.1/hugo_extended_0.160.1_linux-amd64.tar.gz
            checksum: "sha256:133adf4932c1b626b6fe6aa28d56791555abe3ceff167e03be534e8324c9ed39"
            path: ${source.dir}/hugo.tar.gz
            spdx:
              name: hugo
              version: "0.160.1"
              packages:
                - name: hugo
                  purl: "pkg:golang/github.com/gohugoio/hugo@v0.160.1"
                  license: Apache-2.0
            uid: 0
            gid: 0
      pipeline:
        - name: install hugo
          runs: |
            set -eux -o pipefail
            mkdir -p ${target.dir}/usr/local/bin
            cd ${source.dir}
            tar xzf hugo.tar.gz hugo
            install -m 0755 hugo ${target.dir}/usr/local/bin/hugo
      outputs:
        - source: ${target.dir}/usr/local/bin
          target: /usr/local/bin
          uid: 0
          gid: 0

annotations:
  org.opencontainers.image.title: hugo
  org.opencontainers.image.version: "0.160.1"
  org.opencontainers.image.description: Hugo extended static site generator
  org.opencontainers.image.licenses: Apache-2.0
  org.opencontainers.image.vendor: wellmaintained
  org.opencontainers.image.source: https://github.com/wellmaintained/packages-dhi

entrypoint:
  - /usr/local/bin/hugo

# Local deployment compose file for the SENAITE LIMS 1.3.x heritage app.
#
# The senaite-1.3 app ships its own deployment stack alongside the senaite
# (2.x) app — independent project namespace, independent host port, so
# both can run concurrently without colliding.
#
# Notable shape:
#   - image: ghcr.io/wellmaintained/packages-dhi/senaite-lims-1.3:dev
#     (Plone 4.3.20 + senaite.lims 1.3.5; built from
#     apps/senaite-1.3/images/senaite-lims/prod.yaml)
#   - volume mount: /opt/senaite-1.3/var/filestorage (1.3 runtime install path)
#   - nginx config: nginx/default.conf — uses $http_host so the VHM URL
#     preserves the client's :8080 port (the in-container nginx listen
#     port is 80, but the host-published port is 8080)
#   - host port: 8080 by default (peer with senaite 2.x on :80)
#   - top-level name: senaite-1-3 (explicit project name keeps containers,
#     networks, and volumes in their own namespace)
#
# Bring up with:
#   APP=senaite-1.3 just app-up
# Tear down (and wipe the ZODB volume) with:
#   APP=senaite-1.3 just app-down
#
# Default credentials: admin / admin (baked into the senaite-lims image's
# buildout config — see apps/senaite-1.3/images/senaite-lims/prod.yaml
# for the `user = admin:admin` line). For anything beyond local demo use,
# override by initialising your own zope user before exposing the service.

name: senaite-1-3

services:
  senaite-lims:
    # NOTE: ":dev" is the locally-built tag produced by
    # `APP=senaite-1.3 just ci build senaite-lims`. Production deployments
    # will reference the GHCR-published digest from
    # apps/senaite-1.3/app-images.lock.yaml once the pre-release pipeline
    # pushes senaite-lims-1.3 component tags.
    image: ghcr.io/wellmaintained/packages-dhi/senaite-lims-1.3:dev
    restart: ${SENAITE_RESTART_POLICY:-unless-stopped}
    expose:
      - "8080"
    volumes:
      # ZODB Data.fs and BlobStorage live under
      # /opt/senaite-1.3/var/filestorage. The rest of /opt/senaite-1.3/var
      # (logs, instance.pid) is ephemeral and regenerated on each
      # container start.
      - senaite_filestorage_13:/opt/senaite-1.3/var/filestorage
    healthcheck:
      # The image is distroless — no curl/wget. Python 2.7's urllib2 is
      # the built-in HTTP client. Plone 4.3 responds 200 on / even before
      # a SENAITE site has been created (the response is the addsite form).
      test:
        - CMD
        - python
        - -c
        - import urllib2; urllib2.urlopen('http://localhost:8080/', timeout=4).close()
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  senaite-nginx:
    image: dhi.io/nginx:1.29
    restart: ${NGINX_RESTART_POLICY:-unless-stopped}
    ports:
      - "${BIND_IP:-127.0.0.1}:${HTTP_PORT_13:-8080}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      senaite-lims:
        condition: service_healthy

volumes:
  senaite_filestorage_13:

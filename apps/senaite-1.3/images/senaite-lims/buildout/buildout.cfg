# SENAITE LIMS 1.3.5 buildout — installs Plone 4.3.20 + senaite.lims 1.3.5 +
# sibling addons against Python 2.7 (the wellmaintained python-2.7 base image).
#
# This is the 1.3.x heritage sibling of the 2.x current line at
# apps/senaite-current/images/senaite-lims/ (and its frozen 2.3.x
# point at apps/senaite-2.3/images/senaite-lims/). All share the python-2.7
# base image; the difference is the Plone major (4.3 vs 5.2) and
# senaite.lims minor (1.3 vs 2.x). They are kept as separate buildable
# artifacts (separate VEX surfaces, separate scan results).
#
# This file is the canonical source of truth committed alongside the image
# definition. The DHI YAML pipeline materialises an equivalent buildout.cfg
# via inline heredoc at build time — see header in prod.yaml for context.
#
# Upstream reference:
#   https://github.com/senaite/senaite.lims/blob/1.3.5/buildout.cfg
#
# Differences from upstream:
#   - extends Plone 4.3.20 versions.cfg (upstream 1.3.5 extends 4.3.19; 4.3.20
#     is the latest 4.3.x and matches senaite.lims's setup.py "Plone>=4.3.20")
#   - drops mr.developer (we install released versions from PyPI, not git
#     branches, for reproducibility)
#   - keeps a [test] part (zc.recipe.testrunner) so bin/test is available in
#     the runtime image (mirrors the current 2.x build's
#     test-suite-as-build-gate pattern; see
#     apps/senaite-current/TEST-RESULTS.md for the live current-line baseline).
#   - drops i18ndude / update_translations / write_code_headers / lxml /
#     omelette parts (developer conveniences, not needed in a runtime image).
#   - http-address binds 0.0.0.0:8080 for the container (upstream is 127.0.0.1)
#   - adds explicit pins for transitive deps that have moved to Python 3 only
#     since SENAITE 1.3.5 was released (magnitude, Pyphen, et_xmlfile,
#     openpyxl, chardet, requests, urllib3, certifi, idna, plus the WeasyPrint
#     0.42.3 / cairocffi<1.0 / CairoSVG 1.0.20 stack pinned by senaite.core
#     1.3.5).
#
# Package naming difference vs 2.0.0:
#   1.3.x uses senaite.core.listing / senaite.core.spotlight /
#   senaite.core.supermodel; 2.0.0 renamed these to senaite.app.* siblings.

[buildout]
index = https://pypi.org/simple/
extends = https://dist.plone.org/release/4.3.20/versions.cfg
find-links =
    https://dist.plone.org/release/4.3.20/
    https://dist.plone.org/thirdparty/

parts =
    instance
    test

eggs =
    Plone
    Pillow
    lxml
    senaite.core
    senaite.core.listing
    senaite.core.spotlight
    senaite.core.supermodel
    senaite.impress
    senaite.jsonapi
    senaite.lims

versions = versions
show-picked-versions = true

[instance]
recipe = plone.recipe.zope2instance
http-address = 0.0.0.0:8080
user = admin:admin
eggs = ${buildout:eggs}
deprecation-warnings = on
environment-vars =
    zope_i18n_compile_mo_files true

[test]
# zc.recipe.testrunner produces bin/test, the upstream zope.testrunner
# wrapper used by Plone and SENAITE for their own regression suites.
# Pulled in via the testrunner egg pin below. defaults = ['--exit-with-status']
# makes bin/test return a non-zero exit code on test failures so CI can gate
# on it.
recipe = zc.recipe.testrunner
eggs =
    ${buildout:eggs}
    senaite.lims [test]
defaults = ['--exit-with-status', '--auto-color']

[versions]
# Python 2.7 + buildout 2.13 baseline pins.
setuptools = 44.1.1
zc.buildout = 2.13.3
zipp = 1.2.0
zc.recipe.cmmi = 1.3.6
zc.recipe.testrunner = 2.2

# SENAITE 1.3.5 coherent pin set (released 2021-07-24).
# Sibling addons resolved from senaite.lims:1.3.5/setup.py install_requires
# and senaite.core:v1.3.5/setup.py install_requires.
senaite.lims = 1.3.5
senaite.core = 1.3.5
senaite.core.listing = 1.5.3
senaite.core.spotlight = 1.0.4
senaite.core.supermodel = 1.2.5
senaite.impress = 1.2.5
senaite.jsonapi = 1.2.4

# senaite.core 1.3.5 hard pins these (install_requires):
five.pt = 2.2.4
zopyx.txng3.ext = 3.4.0
CairoSVG = 1.0.20
WeasyPrint = 0.42.3
# cairocffi<1.0.0 — last release in 0.x is 0.9.0
cairocffi = 0.9.0

# Transitive deps that have since moved to Python 3 only.
# Pin to the last 2.7-compatible release of each.
magnitude = 0.9.4
Pyphen = 0.9.5
pdfrw = 0.4
chardet = 4.0.0
requests = 2.27.1
urllib3 = 1.26.18
certifi = 2021.10.8
idna = 2.10
et_xmlfile = 1.0.1
openpyxl = 2.6.4
# beautifulsoup4 4.10.0 dropped Python 2; 4.9.3 is the last Py2 release.
# Plone's HTML processing pulls bs4 in transitively. soupsieve is bs4's
# CSS selector backend; 2.x is Py3-only. cssselect 1.2.0 dropped Py2.
beautifulsoup4 = 4.9.3
soupsieve = 1.9.6
cssselect = 1.1.0
# Chameleon 4.x added Py3 type-hint syntax in chameleon/exc.py; 3.9.1 is
# the last 3.x release with Py2.7 support. z3c.pt depends on Chameleon and
# 4.x is Py3 only — keep the pair locked together. Plone 4.3.20's
# versions.cfg pins neither (this gap was the second discover-by-failure
# encountered when bringing 1.3.x up; the 2.0.0 build inherits a tight
# Chameleon pin from Plone 5.2.4's versions.cfg and does not need this).
Chameleon = 3.9.1
z3c.pt = 3.3.1
# dicttoxml 1.7.5+ declares requires_python=>=3.6; 1.7.4 is the last
# release without that constraint and works on Py2.7 in practice.
dicttoxml = 1.7.4
# z3c.jbot 2.x dropped Py2; 1.1.1 is the last 1.x release.
z3c.jbot = 1.1.1
# cffi 2.x and pycparser 3.x dropped Py2. cairocffi==0.9.0's install_requires
# pulls cffi>=0.6 transitively; without these pins buildout's easy_install
# fetches cffi 2.0.0 / pycparser 3.0 and the install fails (newer cffi
# packaging confuses easy_install's _move_to_eggs_dir_and_compile).
cffi = 1.15.1
pycparser = 2.21
# backports.functools_lru_cache 2.0.0 uses Py3 `nonlocal`; 1.6.6 is the
# last Py2-compatible 1.x release. Pulled in transitively via
# soupsieve → bs4.
backports.functools_lru_cache = 1.6.6
# unittest2 is the Python 2 backport of Py3 unittest features used by
# senaite.core's test modules and listed in senaite.lims's [test] extra.
unittest2 = 1.1.0

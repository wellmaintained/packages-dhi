[buildout]
index = https://pypi.org/simple/
# versions.cfg holds the full transitive lock captured from a successful
# buildout run. zc.buildout extends has "later wins" semantics, so we list
# the upstream Plone 5.2.15 versions.cfg FIRST as the baseline, then
# versions.cfg LAST so the local lock overrides any conflicting pin.
extends =
    https://dist.plone.org/release/5.2.15/versions.cfg
    versions.cfg
find-links =
    https://dist.plone.org/release/5.2.15/
    https://dist.plone.org/thirdparty/

parts =
    instance
    test
    omelette
    i18ndude
    zopepy
    update_translations
    update_sources
    write_code_headers

eggs =
    senaite.core
    senaite.app.listing
    senaite.app.spotlight
    senaite.app.supermodel
    senaite.impress
    senaite.jsonapi
    senaite.lims
    plone.reload
    Products.PrintingMailHost

extensions = mr.developer

package-name = senaite.lims

versions = versions
show-picked-versions = true

plone-user = admin:admin

develop = .
sources = sources
auto-checkout = *

[sources]
senaite.core = git https://github.com/senaite/senaite.core.git pushurl=git@github.com:senaite/senaite.core.git branch=2.x
senaite.app.listing = git https://github.com/senaite/senaite.app.listing.git pushurl=git@github.com:senaite/senaite.app.listing.git branch=2.x
senaite.app.spotlight = git https://github.com/senaite/senaite.app.spotlight.git pushurl=git@github.com:senaite/senaite.app.spotlight.git branch=2.x
senaite.app.supermodel = git https://github.com/senaite/senaite.app.supermodel.git pushurl=git@github.com:senaite/senaite.app.supermodel.git branch=2.x
senaite.impress = git https://github.com/senaite/senaite.impress.git pushurl=git@github.com:senaite/senaite.impress.git branch=2.x
senaite.jsonapi = git https://github.com/senaite/senaite.jsonapi.git pushurl=git@github.com:senaite/senaite.jsonapi.git branch=2.x

[instance]
recipe = plone.recipe.zope2instance
http-address = 127.0.0.1:8080
user = ${buildout:plone-user}
wsgi = on
eggs =
    Plone
    plone.app.upgrade
    ${buildout:package-name}
    ${buildout:eggs}
deprecation-warnings = on
environment-vars =
    zope_i18n_compile_mo_files true
zcml =

[i18ndude]
unzip = true
recipe = zc.recipe.egg
eggs = i18ndude

[update_translations]
recipe = collective.recipe.template
output = ${buildout:directory}/bin/update_translations
input = ${buildout:directory}/templates/update_translations.in
mode = 755

[update_sources]
recipe = collective.recipe.template
output = ${buildout:directory}/bin/update_sources
input = ${buildout:directory}/templates/update_sources.in
mode = 755

[write_code_headers]
recipe = collective.recipe.template
output = ${buildout:directory}/bin/write_code_headers
input = ${buildout:directory}/templates/write_code_headers.py.in
mode = 755

[test]
recipe = zc.recipe.testrunner
defaults = ['--auto-color', '--auto-progress']
eggs =
    senaite.lims [test]

[omelette]
recipe = collective.recipe.omelette
eggs = ${buildout:eggs}

[zopepy]
recipe = zc.recipe.egg
eggs = ${instance:eggs}
interpreter = zopepy
scripts = zopepy

[versions]
# Hand-curated overlay — same values as versions.cfg (the auto-generated
# transitive lock). Mirrors the [versions] block materialised by
# prod.yaml's heredoc so this file stays a faithful human reference.
#
# Python 2.7 + buildout 2.13 baseline pins (per upstream
# senaite.lims:2.6.0/buildout.cfg [versions:python27] section).
setuptools = 44.1.1
zc.buildout = 2.13.3
zipp = 1.2.0
zc.recipe.cmmi = 1.3.6
zc.recipe.testrunner = 2.2
Products.SiteErrorLog = 5.4
Products.PloneHotfix20200121 = 1.1

# SENAITE 2.6.0 coherent pin set — last Py2-compatible line.
senaite.lims = 2.6.0
senaite.core = 2.6.0
senaite.app.listing = 2.6.0
senaite.app.spotlight = 2.6.0
senaite.app.supermodel = 2.6.0
senaite.impress = 2.6.0
senaite.jsonapi = 2.6.0

# Transitive deps that have since moved to Python 3 only.
# Pin to the last 2.7-compatible release of each. List inherited from
# the senaite-2.3 lock; 2.6.0 keeps the same heritage cliff.
#
# senaite.impress 2.6.0's setup.py hard-pins pyphen==0.11.0 with the
# comment "pyphen 0.12.0 does not support Python 2.x anymore" — but
# pyphen 0.11.0 itself ships only as a Python-3 wheel + a tar.gz that
# build-isolates against flit_core>=3.2 (Py3-only). On Python 2.7 there
# is no installable pyphen 0.11.0. The image build (see prod.yaml)
# clones senaite.impress 2.6.0, sed-patches the offending pin to a loose
# `pyphen` requirement, and installs it as a develop egg so pyphen 0.9.5
# (pre-pip-installed) satisfies the requirement at runtime.
magnitude = 0.9.4
Pyphen = 0.9.5
pdfrw = 0.4
chardet = 4.0.0
requests = 2.27.1
urllib3 = 1.26.18
certifi = 2021.10.8
idna = 2.10
et_xmlfile = 1.0.1
openpyxl = 2.6.4
# unittest2 is the Python 2 backport of Py3 unittest features that
# senaite.core's test modules rely on (`import unittest2 as unittest`).
unittest2 = 1.1.0

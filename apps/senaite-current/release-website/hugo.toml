baseURL = 'https://wellmaintained.github.io/packages-dhi/senaite-current/'
languageCode = 'en-us'
title = 'senaite · DHI (current)'
ignoreLogs = ['warning-goldmark-raw-html']
enableGitInfo = true

[markup.goldmark.renderer]
  unsafe = true

[module]
  [[module.imports]]
    path = "github.com/imfing/hextra"

[params]
  description = "SENAITE 2.6.0 (Plone 5.2.15 / Python 2.7) — current line of the wellmaintained LIMS distribution, with full SBOM, VEX, and patch provenance."
  externalLinkDecoration = true
  displayUpdatedDate = true
  displayUpdatedAuthor = true

  [params.navbar]
    displayTitle = true
    displayLogo = false
    width = "full"

  [params.theme]
    displayToggle = false

  [params.footer]
    displayPoweredBy = false
    width = "full"

  [params.page]
    width = "wide"

[[menu.main]]
  name = "Quickstart"
  pageRef = "/quickstart"
  weight = 1


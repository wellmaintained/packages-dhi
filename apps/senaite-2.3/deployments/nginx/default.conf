# nginx → Plone reverse proxy for the SENAITE LIMS 2.3.x deployment.
#
# Uses the same VHM pattern as the 2.0.0 sibling at
# apps/senaite/deployments/nginx/default.conf — see that file for the full
# rationale on each header/timeout. The one meaningful difference is the
# VHM proxy_pass uses $http_host instead of $host:$server_port. The 2.3
# stack publishes on host port 8081 by default, but $server_port still
# reflects nginx's in-container listen port (80, unchanged), so
# $host:$server_port would resolve to "localhost:80" and Plone would
# generate links pointing at the wrong port. $http_host is the raw Host
# header value ("localhost:8081" when the browser is on :8081), so it
# stays correct regardless of which host port the stack is published on.
#
# Reference: https://docs.plone.org/manage/installing/upgrade/from24/proxy.html
#            https://5.docs.plone.org/manage/deploying/front-end/nginx.html

upstream senaite {
    server senaite-lims:8080;
}

server {
    listen 80 default_server;
    server_name _;

    # Plone serves files inline; some SENAITE addons stream large reports.
    client_max_body_size 50m;

    # Don't buffer responses to disk — Plone streams reports as they render.
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Forwarded-* headers in addition to the VHM prefix. Plone's
    # plone.protect / plone.subrequest stack honours these when
    # http_address is not bound to the public host (which it isn't here —
    # the backend listens on 0.0.0.0:8080 inside its container).
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://senaite/VirtualHostBase/$scheme/$http_host/VirtualHostRoot/;
    }
}

# SENAITE LIMS 2.3.0 transitive version lock — placeholder.
#
# This file is intended to capture every transitive PyPI dependency resolved
# by buildout, pinning each to the version that was current at first
# successful build. Today it is empty: a successful buildout run is required
# to populate it (e.g. via `bin/buildout annotate` post-install).
#
# Once populated, buildout.cfg should `extends = versions.cfg` so the lock is
# enforced. Until then, buildout resolves transitive dependencies live from
# PyPI at build time.
#
# This is a known-incomplete artefact mirroring the 2.0.0 sibling at
# apps/senaite/images/senaite-lims/buildout/versions.cfg; populating it is a
# follow-up for the senaite-tool-version-pins yak.


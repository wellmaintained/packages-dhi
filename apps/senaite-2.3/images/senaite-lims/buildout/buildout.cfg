# SENAITE LIMS 2.3.0 buildout — installs Plone 5.2.9 + senaite.lims 2.3.0 +
# sibling addons against Python 2.7 (the wellmaintained python-2.7 base image).
#
# This file is the canonical source of truth committed alongside the image
# definition. The DHI YAML pipeline materialises an equivalent buildout.cfg
# via inline heredoc at build time — there is no precedent in this repo for
# copying local files into a DHI build (every contents.files entry uses
# git+https:// or https:// URLs). When the file-injection mechanism is
# solved (see common/images/python-2.7/dhi.yaml header comment for the
# parallel python-2.7 patches/ situation), this file should be wired in
# directly via contents.files and the inline heredoc dropped.
#
# Upstream reference:
#   https://github.com/senaite/senaite.lims/blob/2.3.0/buildout.cfg
#
# Differences from upstream:
#   - extends Plone 5.2.9 explicitly (upstream uses 5.2-latest; pinning
#     a concrete patch makes the build reproducible)
#   - drops mr.developer (we install released versions from PyPI, not git
#     branches, for reproducibility)
#   - keeps a [test] part (zc.recipe.testrunner) so bin/test is available
#     in the runtime image. Required for the upstream Plone + SENAITE
#     regression suites that gate the heritage-demo claim.
#   - http-address binds 0.0.0.0:8080 for the container (upstream is 127.0.0.1)
#   - adds explicit pins for transitive deps that have moved to Python 3
#     only since SENAITE 2.3.0 was released (magnitude, Pyphen, et_xmlfile,
#     openpyxl, chardet, requests, urllib3, certifi, idna, unittest2)

[buildout]
index = https://pypi.org/simple/
extends = https://dist.plone.org/release/5.2.9/versions.cfg
find-links =
    https://dist.plone.org/release/5.2.9/
    https://dist.plone.org/thirdparty/

# senaite.impress 2.3.0 from a local checkout with patched setup.py
# (the install step in prod.yaml git-clones the source and sed-patches
# the broken pyphen==0.11.0 pin to a loose `pyphen` requirement). See
# the [versions] Pyphen comment for the cliff-fix rationale.
develop = src/senaite.impress

parts =
    instance
    test

eggs =
    Plone[archetypes]
    plone.app.contenttypes[atrefs]
    plone.app.upgrade
    plone.app.testing
    senaite.core
    senaite.app.listing
    senaite.app.spotlight
    senaite.app.supermodel
    senaite.impress
    senaite.jsonapi
    senaite.lims

versions = versions
show-picked-versions = true

[instance]
recipe = plone.recipe.zope2instance
http-address = 0.0.0.0:8080
user = admin:admin
wsgi = off
eggs = ${buildout:eggs}
deprecation-warnings = on
environment-vars =
    zope_i18n_compile_mo_files true

[test]
# zc.recipe.testrunner produces bin/test, the upstream zope.testrunner
# wrapper used by Plone and SENAITE for their own regression suites.
# defaults = ['--exit-with-status'] makes bin/test return a non-zero exit
# code on test failures so CI can gate on it.
recipe = zc.recipe.testrunner
eggs = ${buildout:eggs}
defaults = ['--exit-with-status', '--auto-color']

[versions]
# Python 2.7 + buildout 2.13 baseline pins (per upstream
# senaite.lims:2.3.0/buildout.cfg [versions:python27] section).
setuptools = 44.1.1
zc.buildout = 2.13.3
zipp = 1.2.0
zc.recipe.cmmi = 1.3.6
zc.recipe.testrunner = 2.2
Products.SiteErrorLog = 5.4
Products.PloneHotfix20200121 = 1.1

# SENAITE 2.3.0 coherent pin set (released 2022-10-04).
senaite.lims = 2.3.0
senaite.core = 2.3.0
senaite.app.listing = 2.3.0
senaite.app.spotlight = 2.3.0
senaite.app.supermodel = 2.3.0
senaite.impress = 2.3.0
senaite.jsonapi = 2.3.0

# Transitive deps that have since moved to Python 3 only.
# Pin to the last 2.7-compatible release of each.
#
# senaite.impress 2.3.0's setup.py hard-pins pyphen==0.11.0, but pyphen
# 0.11.0 ships only as a Python-3 wheel + a tar.gz that build-isolates
# against flit_core>=3.2 (Py3-only). On Python 2.7 there is no
# installable pyphen 0.11.0. The image build (see prod.yaml) installs
# senaite.impress 2.3.0 itself with --no-deps and patches its
# METADATA to relax the pyphen pin so pyphen 0.9.5 (pre-installed)
# satisfies the requirement at runtime.
magnitude = 0.9.4
Pyphen = 0.9.5
pdfrw = 0.4
chardet = 4.0.0
requests = 2.27.1
urllib3 = 1.26.18
certifi = 2021.10.8
idna = 2.10
et_xmlfile = 1.0.1
openpyxl = 2.6.4
# unittest2 is the Python 2 backport of Py3 unittest features that
# senaite.core's test modules rely on (`import unittest2 as unittest`).
unittest2 = 1.1.0

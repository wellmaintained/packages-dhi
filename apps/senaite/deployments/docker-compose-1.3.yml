# Source compose file for the SENAITE LIMS 1.3.x local deployment.
#
# Sibling of docker-compose.yml (which runs the 2.0.0 demo). Both files
# live side-by-side in this directory and are kept structurally similar
# on purpose — the long-term shape of a "release line" abstraction will
# emerge from this duplication once the smoke-test + release-website
# integration siblings land. Until then, treat divergences as evidence
# rather than tech debt.
#
# Differences from the 2.0.0 sibling:
#   - image: senaite-lims-1.3:dev (Plone 4.3.20 + senaite.lims 1.3.5)
#   - volume mount: /opt/senaite-1.3/var/filestorage (1.3 install path)
#   - nginx config: nginx/default-1.3.conf (uses $http_host so the VHM
#     URL preserves the client's :8080 port — the shared :80 config in
#     the 2.0.0 sibling hardcodes $server_port which is the in-container
#     nginx listen port, not the host-published port).
#   - host port: 8080 by default (so 2.0.0 on :80 and 1.3.x on :8080
#     can coexist without binding the same host port).
#   - top-level name: senaite-1-3 (explicit project name; the 2.0.0
#     sibling defaults to "deployments" via the parent directory name,
#     so the two compose stacks land in distinct project namespaces and
#     don't share container/volume/network names).
#
# Bring up with:
#   just senaite-1.3-up
# Tear down (and wipe the ZODB volume) with:
#   just senaite-1.3-down
#
# Default credentials: admin / admin (baked into the senaite-lims-1.3
# image's buildout config — see apps/senaite/images/senaite-lims-1.3/
# prod.yaml for the `user = admin:admin` line). For anything beyond
# local demo use, override by initialising your own zope user before
# exposing the service.

name: senaite-1-3

services:
  senaite-lims:
    # NOTE: ":dev" is the locally-built tag produced by
    # `APP=senaite just ci build senaite-lims-1.3`. Production deployments
    # will reference the GHCR-published digest from
    # apps/senaite/app-images.lock.yaml once the pre-release pipeline
    # pushes senaite-lims-1.3 component tags.
    image: ghcr.io/wellmaintained/packages-dhi/senaite-lims-1.3:dev
    restart: ${SENAITE_RESTART_POLICY:-unless-stopped}
    expose:
      - "8080"
    volumes:
      # ZODB Data.fs and BlobStorage live under
      # /opt/senaite-1.3/var/filestorage. The rest of /opt/senaite-1.3/var
      # (logs, instance.pid) is ephemeral and regenerated on each
      # container start.
      - senaite_filestorage_13:/opt/senaite-1.3/var/filestorage
    healthcheck:
      # The image is distroless — no curl/wget. Python 2.7's urllib2 is
      # the built-in HTTP client. Plone 4.3 responds 200 on / even before
      # a SENAITE site has been created (the response is the addsite
      # form). Same pattern as the 2.0.0 sibling.
      test:
        - CMD
        - python
        - -c
        - import urllib2; urllib2.urlopen('http://localhost:8080/', timeout=4).close()
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

  senaite-nginx:
    image: dhi.io/nginx:1.29
    restart: ${NGINX_RESTART_POLICY:-unless-stopped}
    ports:
      - "${BIND_IP:-127.0.0.1}:${HTTP_PORT_13:-8080}:80"
    volumes:
      - ./nginx/default-1.3.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      senaite-lims:
        condition: service_healthy

volumes:
  senaite_filestorage_13:

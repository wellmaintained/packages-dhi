# nginx → Plone reverse proxy for the SENAITE LIMS local deployment.
#
# Plone uses a VirtualHostMonster (VHM) URL prefix to learn its public
# host/port/scheme so it can rewrite generated URLs (links, redirects,
# absolute_url() calls) to match what the browser actually sees. Without
# VHM, Plone would emit links pointing at http://senaite-lims:8080/...
# which the user's browser cannot resolve.
#
# The proxy_pass below uses the "no-site-id" form of the VHM path so that
# `/` resolves to the Zope application root. This is what the SENAITE
# add-site form expects on first run; once the user creates a site at
# /senaite the same prefix continues to work for /senaite/* paths.
#
# Reference: https://docs.plone.org/manage/installing/upgrade/from24/proxy.html
#            https://5.docs.plone.org/manage/deploying/front-end/nginx.html

upstream senaite {
    server senaite-lims:8080;
}

server {
    listen 80 default_server;
    server_name _;

    # Plone serves files inline; some SENAITE addons stream large reports.
    client_max_body_size 50m;

    # Don't buffer responses to disk — Plone streams reports as they render.
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Forwarded-* headers in addition to the VHM prefix. Plone's
    # plone.protect / plone.subrequest stack honours these when
    # http_address is not bound to the public host (which it isn't here —
    # the backend listens on 0.0.0.0:8080 inside its container).
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;

    location / {
        proxy_pass http://senaite/VirtualHostBase/$scheme/$host:$server_port/VirtualHostRoot/;
    }
}

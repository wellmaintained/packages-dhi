# syntax=dhi.io/build:2-debian13
#
# SENAITE LIMS 2.0.0 DHI YAML image definition.
#
# Plone 5.2.4 + senaite.lims 2.0.0 (and sibling addons) installed via
# zc.buildout against the wellmaintained python-2.7 heritage base image.
#
# NOTE: DHI pipelines run without network access (hermetic builds).
# The buildout install step needs network for PyPI fetches, so it sets
# privileged: true.
#
# To build:
#   APP=senaite just ci build python-2.7      # base must exist locally first
#   APP=senaite just ci build senaite-lims
#
# Upstream reference:
#   https://github.com/senaite/senaite.lims/blob/2.0.0/buildout.cfg
#
# The buildout configuration is committed at
# apps/senaite/images/senaite-lims/buildout/{buildout.cfg,versions.cfg} for
# version control and human reference. The pipeline materialises an
# equivalent buildout.cfg via inline heredoc — there is no precedent in this
# repo for copying local files into a DHI build (see common/images/
# python-2.7/dhi.yaml header for the parallel patches/ situation).

name: SENAITE LIMS (wellmaintained)
image: ghcr.io/wellmaintained/packages-dhi/senaite-lims
variant: runtime
tags:
  - latest
platforms:
  - linux/amd64

contents:
  packages:
    - base-files
    - ca-certificates
    # libc-bin provides /sbin/ldconfig — Python's ctypes.util.find_library
    # uses it to locate shared libs; without it scandir / pathlib2 fall
    # back to invoking gcc which isn't present in the runtime image.
    - libc-bin
    # Runtime shared libraries inherited from the python-2.7 base image's
    # contents.packages list. artifacts: pulls /opt/python-2.7 binaries
    # but not the system .deb dependencies, so they must be re-declared here.
    - libssl3t64
    - libsqlite3-0
    - libffi8
    - libreadline8t64
    - libncursesw6
    - libtinfo6
    - zlib1g
    - libbz2-1.0
    - liblzma5
    - libgdbm6t64
    - libgdbm-compat4t64
    - libuuid1
    # libxml2 / libxslt are pulled in by lxml — a Plone runtime requirement.
    - libxml2
    - libxslt1.1
    # libjpeg + zlib backed PIL image handling.
    - libjpeg62-turbo
    # WeasyPrint (PDF rendering for SENAITE reports/labels) — pulls
    # cairo + pango + gdk-pixbuf via cairocffi/pangocffi.
    - libcairo2
    - libpango-1.0-0
    - libpangocairo-1.0-0
    - libgdk-pixbuf-2.0-0

  builds:
    - name: senaite-buildout
      # Builder uses our locally-built python-2.7 image. The digest is taken
      # from `docker images --digests ghcr.io/wellmaintained/packages-dhi/
      # python-2.7:dev` after running `APP=senaite just ci build python-2.7`.
      # This is brittle — the digest changes every rebuild; CI will need a
      # different mechanism (probably pulling the previously-pushed component
      # tag from GHCR). See ORIENTATION-NOTES.md §"CRITICAL: inter-image
      # dependency on python-2.7 not currently expressible".
      # TODO: replace with a published GHCR component-tag digest once the
      # CI pre-release pipeline pushes python-2.7. The current tag-only
      # reference resolves against the local docker image store (works with
      # buildx's docker driver after `APP=senaite just ci build python-2.7`)
      # but is non-reproducible — any local rebuild silently changes the
      # base.
      uses: ghcr.io/wellmaintained/packages-dhi/python-2.7:dev
      contents:
        packages:
          # The python-2.7 base is distroless — no shell, no coreutils.
          # The DHI pipeline runner invokes pipeline runs via /bin/sh, so
          # dash (provides /bin/sh) + bash (for `set -o pipefail` etc.) are
          # mandatory layered additions.
          - dash
          - bash
          - coreutils
          - findutils
          - tar
          - gzip
          - unzip
          - sed
          - grep
          # libc-bin provides /sbin/ldconfig — used in strip step to
          # generate /etc/ld.so.cache for the runtime image. The cache is
          # built from the libs available in THIS builder, so any runtime
          # lib that needs to be resolvable via ctypes.util.find_library
          # (cairocffi, pangocffi, etc.) must also be installed here.
          - libc-bin
          - libcairo2
          - libpango-1.0-0
          - libpangocairo-1.0-0
          - libgdk-pixbuf-2.0-0
          # Build toolchain for buildout-installed C extensions
          # (zope.interface, ZODB BTrees, lxml, Pillow, ...).
          - build-essential
          - libssl-dev
          - libffi-dev
          - libxml2-dev
          - libxslt1-dev
          - libjpeg-dev
          - zlib1g-dev
          - libbz2-dev
          - libsqlite3-dev
          # git is required by zc.buildout's `mr.developer` extension and
          # for any source pins that resolve to git URLs.
          - git
        files:
          # senaite.lims source. The git+https form is required by
          # ci/mod.just::_component-tag, which greps the YAML for the source
          # ref to derive the version segment of the output image's
          # component tag (senaite-lims-2.0.0-<sha7>).
          - url: "git+https://github.com/senaite/senaite.lims.git#2.0.0"
            path: ${source.dir}/senaite-lims
            spdx:
              name: senaite.lims
              version: "2.0.0"
              packages:
                - name: senaite.lims
                  purl: "pkg:pypi/senaite.lims@2.0.0"
                  license: GPL-2.0-only
            uid: 0
            gid: 0
      pipeline:
        - name: write buildout config
          # Materialise the buildout.cfg + versions.cfg locally. The
          # canonical source of truth is committed at
          # apps/senaite/images/senaite-lims/buildout/. Keep the heredoc
          # below in sync until a file-injection mechanism replaces this
          # pattern (see header comment).
          runs: |
            set -eux -o pipefail
            mkdir -p ${target.dir}/opt/senaite
            cat > ${target.dir}/opt/senaite/buildout.cfg <<'BUILDOUT_CFG'
            [buildout]
            index = https://pypi.org/simple/
            extends = https://dist.plone.org/release/5.2.4/versions.cfg
            find-links =
                https://dist.plone.org/release/5.2.4/
                https://dist.plone.org/thirdparty/

            parts =
                instance
                test

            eggs =
                Plone[archetypes]
                plone.app.contenttypes[atrefs]
                plone.app.upgrade
                plone.app.testing
                senaite.core
                senaite.app.listing
                senaite.app.spotlight
                senaite.app.supermodel
                senaite.impress
                senaite.jsonapi
                senaite.lims

            versions = versions
            show-picked-versions = true

            [instance]
            recipe = plone.recipe.zope2instance
            http-address = 0.0.0.0:8080
            user = admin:admin
            wsgi = off
            eggs = ${buildout:eggs}
            deprecation-warnings = on
            environment-vars =
                zope_i18n_compile_mo_files true

            [test]
            recipe = zc.recipe.testrunner
            eggs = ${buildout:eggs}
            defaults = ['--exit-with-status', '--auto-color']

            [versions]
            setuptools = 44.1.1
            zc.buildout = 2.13.3
            zipp = 1.2.0
            zc.recipe.cmmi = 1.3.6
            zc.recipe.testrunner = 2.2
            Products.SiteErrorLog = 5.4
            Products.PloneHotfix20200121 = 1.1
            senaite.lims = 2.0.0
            senaite.core = 2.0.0
            senaite.app.listing = 2.0.0
            senaite.app.spotlight = 2.0.0
            senaite.app.supermodel = 2.0.0
            senaite.impress = 2.0.0
            senaite.jsonapi = 2.0.0
            # Transitive deps that have since moved to Python 3 only.
            # Pin to the last 2.7-compatible release.
            magnitude = 0.9.4
            Pyphen = 0.9.5
            pdfrw = 0.4
            chardet = 4.0.0
            requests = 2.27.1
            urllib3 = 1.26.18
            certifi = 2021.10.8
            idna = 2.10
            et_xmlfile = 1.0.1
            openpyxl = 2.6.4
            unittest2 = 1.1.0
            BUILDOUT_CFG

        - name: install zc.buildout
          # pip + buildout fetch from PyPI; needs network.
          privileged: true
          work-dir: ${target.dir}/opt/senaite
          runs: |
            set -eux -o pipefail
            # The python-2.7 base ships pip 20.3.4 (last 2.7-compatible).
            python -m pip install \
                "zc.buildout==2.13.3" \
                "setuptools==44.1.1"
            # Pre-install transitive deps that have moved to Python 3 only
            # since SENAITE 2.0.0 was released. Buildout's [versions] pins
            # are not honoured for indirect deps in this 2026/PyPI mismatch
            # scenario — easy_install fetches the latest and then fails to
            # parse Py3 syntax. pip's resolver respects requires_python and
            # picks a Py2-compatible release; once installed in
            # site-packages, buildout finds the egg and skips its own
            # materialisation.
            #
            # This list is incomplete — every fresh build may surface
            # another. A full transitive lock (the versions.cfg lock file
            # acceptance criterion) requires running buildout to completion
            # at least once and capturing `bin/buildout annotate` output.
            # --target installs into /opt/senaite/lib/python2.7/site-packages
            # which lands in the runtime image (the builder's own
            # site-packages is not preserved — the runtime pulls
            # /opt/python-2.7/** from the python-2.7 image, not the
            # builder). The path is added to sys.path via PYTHONPATH in
            # the runtime environment block.
            mkdir -p ${target.dir}/opt/senaite/lib/python2.7/site-packages
            python -m pip install \
                --target=${target.dir}/opt/senaite/lib/python2.7/site-packages \
                "magnitude==0.9.4" \
                "Pyphen==0.9.5" \
                "et_xmlfile==1.0.1" \
                "openpyxl==2.6.4" \
                "chardet==4.0.0" \
                "requests==2.27.1" \
                "urllib3==1.26.18" \
                "certifi==2021.10.8" \
                "idna==2.10" \
                "unittest2==1.1.0"
            # Mirror the pre-install into the builder's base site-packages
            # too, so subsequent buildout steps can import these
            # transitively (otherwise easy_install will refetch and fail).
            #
            # unittest2 is the Python 2 backport of Py3 unittest features
            # used by senaite.core's test modules (`import unittest2 as
            # unittest`). Without it senaite.core tests fail to import.
            python -m pip install \
                "magnitude==0.9.4" \
                "Pyphen==0.9.5" \
                "et_xmlfile==1.0.1" \
                "openpyxl==2.6.4" \
                "chardet==4.0.0" \
                "requests==2.27.1" \
                "urllib3==1.26.18" \
                "certifi==2021.10.8" \
                "idna==2.10" \
                "unittest2==1.1.0"

        - name: run buildout
          privileged: true
          work-dir: ${target.dir}/opt/senaite
          runs: |
            set -eux -o pipefail
            # Run buildout in-place; eggs/, parts/, bin/, develop-eggs/
            # all materialise under /opt/senaite. Absolute paths in
            # buildout-generated scripts will resolve at runtime.
            #
            # CFLAGS relax modern gcc (debian13 ships gcc 14) which
            # promotes several K&R-era warnings to fatal errors.
            # SENAITE 2.0.0's transitive deps include 2016-era C
            # extensions (e.g. zopyx.txng3.ext) whose source predates
            # the Py_ssize_t transition and uses int* where Python's
            # headers expect Py_ssize_t*. -Wno-error keeps them as
            # warnings so compilation succeeds. -Wno-implicit-function-
            # declaration covers the matching gcc 14 promotion.
            export CFLAGS="-Wno-error=incompatible-pointer-types"
            CFLAGS="${CFLAGS} -Wno-error=implicit-function-declaration"
            CFLAGS="${CFLAGS} -Wno-error=int-conversion"
            CFLAGS="${CFLAGS} -Wno-error=discarded-qualifiers"
            CFLAGS="${CFLAGS} -Wno-error=return-mismatch"
            export CFLAGS
            buildout -c buildout.cfg

        - name: smoke-test runtime dependencies
          # Deterministic build gate. Two checks:
          #   1. ldd-walk every .so under ${target.dir}/opt — fail on any
          #      "not found" line (catches C extensions that link against
          #      libs missing from the runtime artefact).
          #   2. import-walk every top-level module in the pre-pip
          #      site-packages and every buildout egg — fail on ImportError
          #      or OSError (catches missing transitive Python deps and
          #      ctypes-backed lookups for C libs that can't resolve).
          # Yakriel's Step 5 surfaced ~10 of these via discover-by-failure
          # over multiple build cycles; this gate turns the equivalent
          # class of bug into a single fast failure during the build.
          #
          # Runs BEFORE the strip step so bin/* and parts/* paths still
          # reference the builder filesystem (${target.dir}/opt/senaite).
          # Strip rewrites them to /opt/senaite, a path that does not
          # exist in the builder; running smoke-test after strip would
          # chase ENOENT on the rewritten paths.
          #
          # Limitation: this runs in the BUILDER stage, which has the
          # *-dev packages installed. A library that lives only in the
          # builder's contents.packages (and not in the runtime's) will
          # not be caught here — closing that gap requires a post-build
          # container smoke test, out of scope for this gate.
          work-dir: ${target.dir}/opt/senaite
          runs: |
            set -eux -o pipefail

            echo "=== smoke-test 1a: ldd-walk shared objects under ${target.dir}/opt ==="
            # Pipeline shell is /bin/sh (dash), so no bash process
            # substitution. find -exec sh -c keeps the inner loop POSIX
            # while still capturing per-file context in the output.
            #
            # Skip .libs/ directories (auditwheel/manylinux convention):
            # bundled deps inside <pkg>/.libs/ or <pkg>.libs/ are loaded
            # via the parent extension's RPATH=$ORIGIN/.libs and have no
            # RPATH of their own, so ldd-in-isolation reports them as
            # "not found" even though they resolve correctly at runtime.
            # The parent .so (e.g. PIL/_imaging.so) is still checked and
            # is the actual signal we care about.
            ldd_findings=$(find ${target.dir}/opt -name '*.so*' -type f \
                -not -path '*.libs/*' \
                -exec sh -c '
                so="$1"
                missing=$(ldd "$so" 2>&1 | grep "not found" || true)
                if [ -n "$missing" ]; then
                    echo "--- missing libs for $so ---"
                    echo "$missing"
                fi
            ' _ {} \;)
            if [ -n "$ldd_findings" ]; then
                echo "=== smoke-test 1a: FAILED ==="
                echo "$ldd_findings"
                exit 1
            fi
            echo "smoke-test 1a: ldd-walk clean"

            echo "=== smoke-test 1b: import-walk site-packages + eggs ==="
            # Refresh /etc/ld.so.cache: DHI's package-install step doesn't
            # always trigger libc-bin's ldconfig hook, leaving the cache
            # stale or empty. ctypes.util.find_library() (used by cairocffi
            # / cffi / many transitive deps) falls back to that cache, so
            # imports of weasyprint, cairosvg, etc. silently fail unless we
            # rebuild it here. The strip step bakes the runtime cache later
            # at ${target.dir}/etc/ld.so.cache; this run targets the
            # builder's own /etc/ld.so.cache for the import test.
            /sbin/ldconfig

            # Mirror the runtime environment block: LD_LIBRARY_PATH for the
            # shared libpython2.7.so, PYTHONPATH for pip-installed packages.
            # Each .egg under eggs/ is added to sys.path inside the python
            # invocation so its top-level modules become importable.
            LD_LIBRARY_PATH=/opt/python-2.7/lib \
            PYTHONPATH=${target.dir}/opt/senaite/lib/python2.7/site-packages \
            PYTHONDONTWRITEBYTECODE=1 \
            python <<'PYEOF'
            import os, sys, importlib, pkgutil

            # Platform-impossible modules: Python 3 forward-shims and
            # Windows-only modules that exist in the eggs as compatibility
            # placeholders but cannot import on Python 2.7 + Linux.
            # Skipping them keeps real failures from being lost in noise.
            SKIP = {
                'tkinter',   # Py3 name; we ship Python 2.7 (capital Tkinter)
                '_tkinter',  # C extension; not built into our cpython
                'winreg',    # Py3 Windows registry module
                '_winreg',   # Py2 Windows registry module, Linux has none
            }

            site_packages = '${target.dir}/opt/senaite/lib/python2.7/site-packages'
            eggs_dir = '${target.dir}/opt/senaite/eggs'

            walk_paths = []
            if os.path.isdir(site_packages):
                walk_paths.append(site_packages)
            if os.path.isdir(eggs_dir):
                for entry in sorted(os.listdir(eggs_dir)):
                    egg_path = os.path.join(eggs_dir, entry)
                    if os.path.isdir(egg_path):
                        sys.path.insert(0, egg_path)
                        walk_paths.append(egg_path)

            errors = []
            seen = set()
            for path in walk_paths:
                for _, name, _ in pkgutil.iter_modules([path]):
                    if name in seen or name in SKIP:
                        continue
                    seen.add(name)
                    try:
                        importlib.import_module(name)
                    except (ImportError, OSError) as e:
                        errors.append((name, type(e).__name__, str(e)))

            if errors:
                print('=== Import errors (%d) ===' % len(errors))
                for n, t, e in errors:
                    print('  %s [%s]: %s' % (n, t, e))
                sys.exit(1)

            print('smoke-test 1b: %d top-level modules imported clean (%d skipped as platform-impossible)' % (len(seen), len(SKIP)))
            PYEOF

        - name: strip buildout machinery
          work-dir: ${target.dir}/opt/senaite
          runs: |
            set -eux -o pipefail
            # Drop downloads cache and build artefacts; keep eggs/, parts/,
            # bin/, develop-eggs/ — these are needed by bin/instance at
            # runtime.
            rm -rf downloads .installed.cfg
            # Trim .pyc bytecode (will regenerate on first run).
            find . -name '*.pyc' -delete
            find . -name '__pycache__' -type d -exec rm -rf {} +
            # Path surgery: buildout was run with buildout-directory =
            # ${target.dir}/opt/senaite (which expands to /out/opt/senaite
            # at build time). bin/instance and parts/instance/etc/* contain
            # absolute paths to eggs/ and config — rewrite them to the
            # runtime path /opt/senaite. Mirrors the sbomify-app shebang-
            # surgery pattern (apps/sbomify-current/images/sbomify-app/prod.yaml).
            grep -rlI '/out/opt/senaite' . 2>/dev/null \
                | xargs -r sed -i 's|/out/opt/senaite|/opt/senaite|g' || true
            # Permissions: buildout runs as root in the build container, so
            # everything under /opt/senaite is owned root:root with default
            # mode. The runtime image runs as senaite (uid/gid 65532).
            # Make eggs/ + parts/ + bin/ world-readable; chown var/ (Plone
            # writes ZODB + logs there) to senaite.
            chmod -R a+rX bin eggs parts develop-eggs
            # Plone (var/ for ZODB + logs) and zopyx.txng3.core (writes
            # textindexng3.log into the buildout root) need the senaite
            # user to own these paths. Chown the whole tree — eggs are
            # already world-readable so this doesn't tighten access.
            chown -R 65532:65532 .
            # Bake /etc/ld.so.cache for the runtime: Plone's transitive
            # dep chain (scandir → pathlib2 → importlib_metadata →
            # jsonschema → plone.schema) calls ctypes.util.find_library('c')
            # at import time, which requires either /sbin/ldconfig + cache
            # or a working gcc at runtime. The runtime image has neither
            # (distroless), so we generate the cache at build time. The
            # builder shares debian13 + the same libc, so cache entries for
            # standard system libs translate to the runtime correctly.
            mkdir -p ${target.dir}/etc
            /sbin/ldconfig -C ${target.dir}/etc/ld.so.cache
      outputs:
        - source: ${target.dir}/opt/senaite
          target: /opt/senaite
          # senaite user/group — Plone needs to write var/ (ZODB),
          # textindexng3 writes a log at /opt/senaite/textindexng3.log,
          # and pyc bytecode regeneration writes alongside .py files.
          uid: 65532
          gid: 65532
        - source: ${target.dir}/etc/ld.so.cache
          target: /etc/ld.so.cache
          uid: 0
          gid: 0

  artifacts:
    # Pull the python-2.7 interpreter + stdlib from the wellmaintained base
    # image. See note on uses: above re digest brittleness.
    - name: ghcr.io/wellmaintained/packages-dhi/python-2.7:dev
      includes:
        - opt/python-2.7/**
      uid: 0
      gid: 0

accounts:
  run-as: senaite
  users:
    - name: senaite
      uid: 65532
      gid: 65532
  groups:
    - name: senaite
      gid: 65532
      members:
        - senaite

environment:
  PATH: /opt/senaite/bin:/opt/python-2.7/bin:/usr/local/bin:/usr/bin:/bin
  # CPython 2.7 was built --enable-shared; libpython2.7.so lives in
  # /opt/python-2.7/lib, which ld.so doesn't search by default.
  LD_LIBRARY_PATH: /opt/python-2.7/lib
  # Pre-pip-installed packages (Pyphen, magnitude, openpyxl, requests
  # stack) live here — these supplement the buildout-resolved eggs that
  # bin/instance puts on sys.path.
  PYTHONPATH: /opt/senaite/lib/python2.7/site-packages
  PYTHONUNBUFFERED: "1"
  PYTHONDONTWRITEBYTECODE: "1"

annotations:
  org.opencontainers.image.title: senaite-lims
  org.opencontainers.image.version: "2.0.0"
  org.opencontainers.image.description: SENAITE LIMS 2.0.0 on Plone 5.2.4 (wellmaintained heritage build)
  org.opencontainers.image.licenses: GPL-2.0-only
  org.opencontainers.image.vendor: wellmaintained
  org.opencontainers.image.source: https://github.com/wellmaintained/packages-dhi

work-dir: /opt/senaite

entrypoint:
  - /opt/senaite/bin/instance
cmd:
  - fg

ports:
  - 8080/tcp

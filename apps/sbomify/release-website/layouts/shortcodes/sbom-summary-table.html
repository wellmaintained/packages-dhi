{{ $release := hugo.Data.release }}
{{ if $release }}
<table>
<thead>
<tr><th>Image</th><th>Type</th><th>Format</th><th></th></tr>
</thead>
<tbody>
{{ range $release.images }}
<tr>
  <td><strong>{{ .name }}</strong></td>
  <td>{{ .type }}</td>
  <td>CycloneDX</td>
  <td><a href="{{ printf "artifacts/sboms/%s.cdx.json" .name | relURL }}">Download</a></td>
</tr>
{{ end }}
</tbody>
</table>
{{ else }}
<p><em>Release data not available.</em></p>
{{ end }}

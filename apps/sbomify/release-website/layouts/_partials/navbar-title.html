{{- $version := (hugo.Data.release).version | default "" -}}
<div class="hx:flex hx:items-center hx:hover:opacity-75 hx:ltr:mr-auto hx:rtl:ml-auto">
  <a href="{{ .Site.Home.RelPermalink }}" class="hx:flex hx:items-center">
    <img src="{{ "images/logo.svg" | relURL }}" alt="Logo" width="32" height="32" style="margin-right: 0.5rem;" />
  </a>
  <div class="hx:flex hx:flex-col" style="line-height: 1.2;">
    <div class="hx:flex hx:items-baseline hx:gap-2">
      <a href="{{ .Site.Home.RelPermalink }}" class="hx:font-extrabold hx:select-none" style="font-size: 1rem;">
        {{- .Site.Title -}}
      </a>
      {{- with $version }}
      <span class="hx:select-none" title="release version" style="font-family: ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, Consolas, monospace; font-size: 0.7rem; opacity: 0.7;">{{ . }}</span>
      {{- end }}
    </div>
    <a href="https://github.com/wellmaintained/packages-dhi" class="hx:select-none" style="font-size: 0.7rem; opacity: 0.6;">
      by wellmaintained/packages-dhi
    </a>
  </div>
</div>

name: Setup Pipeline
description: Checkout, install just, and optionally login to container registries

inputs:
  dhi-login:
    description: Login to dhi.io registry
    default: 'true'
  dhi-username:
    description: DHI registry username
  dhi-token:
    description: DHI registry token
  ghcr-login:
    description: Login to ghcr.io registry
    default: 'false'
  ghcr-username:
    description: GHCR username (typically github.actor)
  ghcr-token:
    description: GHCR token (typically secrets.GITHUB_TOKEN)
  cache-key:
    description: Suffix for cache keys (use matrix.image or job name to avoid cross-job conflicts)
    default: 'default'
runs:
  using: composite
  steps:
    - name: Install just
      uses: extractions/setup-just@dd310ad5a97d8e7b41793f8ef055398d51ad4de6 # v2

    - name: Install uv
      uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0
      with:
        enable-cache: false

    - name: Cache packages-dhi tools and data
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: /home/runner/.cache/packages-dhi
        key: packages-dhi-cache-${{ inputs.cache-key }}-${{ hashFiles('common/tool-versions.yaml') }}
        restore-keys: |
          packages-dhi-cache-${{ inputs.cache-key }}-
          packages-dhi-cache-

    - name: Cache sbomify enrichment data
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: /home/runner/.cache/sbomify
        key: sbomify-cache-${{ inputs.cache-key }}
        restore-keys: |
          sbomify-cache-

    - name: Set cache environment variables
      shell: bash
      run: |
        echo "PACKAGES_DHI_CACHE=$HOME/.cache/packages-dhi" >> "$GITHUB_ENV"
        echo "GRYPE_DB_CACHE_DIR=$HOME/.cache/packages-dhi/grype" >> "$GITHUB_ENV"
        echo "UV_CACHE_DIR=$HOME/.cache/packages-dhi/uv" >> "$GITHUB_ENV"
        echo "HUGO_CACHEDIR=$HOME/.cache/packages-dhi/hugo" >> "$GITHUB_ENV"

    - name: Debug cache contents
      shell: bash
      run: |
        echo "=== packages-dhi cache ==="
        ls -la ~/.cache/packages-dhi/ 2>/dev/null || echo "(empty or missing)"
        ls -la ~/.cache/packages-dhi/tools/ 2>/dev/null || echo "  tools/ (empty or missing)"
        ls -la ~/.cache/packages-dhi/compliance-artifacts/ 2>/dev/null || echo "  compliance-artifacts/ (empty or missing)"
        echo "=== sbomify cache ==="
        ls -la ~/.cache/sbomify/ 2>/dev/null || echo "(empty or missing)"

    - name: Enable containerd image store
      shell: bash
      run: |
        sudo mkdir -p /etc/docker
        echo '{"features":{"containerd-snapshotter":true}}' | sudo tee /etc/docker/daemon.json
        sudo systemctl restart docker

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      with:
        driver: docker

    - name: Login to dhi.io
      if: inputs.dhi-login == 'true'
      shell: bash
      run: echo "$DHI_TOKEN" | docker login dhi.io -u "$DHI_USERNAME" --password-stdin
      env:
        DHI_USERNAME: ${{ inputs.dhi-username }}
        DHI_TOKEN: ${{ inputs.dhi-token }}

    - name: Login to GHCR
      if: inputs.ghcr-login == 'true'
      shell: bash
      run: echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
      env:
        GHCR_USERNAME: ${{ inputs.ghcr-username }}
        GHCR_TOKEN: ${{ inputs.ghcr-token }}

    - name: Hydrate grype vulnerability DB
      shell: bash
      run: ./bin/grype db update

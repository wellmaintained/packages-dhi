name: Quality Gate

on:
  workflow_run:
    workflows: ['Build']
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  resolve:
    name: Resolve affected apps
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.read.outputs.apps }}
    steps:
      - name: Download affected-apps artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: affected-apps
          path: .
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - id: read
        name: Read affected apps
        run: echo "apps=$(cat affected-apps.json)" >> "$GITHUB_OUTPUT"

  app-quality-gates:
    name: Quality gate ${{ matrix.app }}
    needs: resolve
    if: ${{ needs.resolve.outputs.apps != '[]' }}
    strategy:
      matrix:
        app: ${{ fromJSON(needs.resolve.outputs.apps) }}
      fail-fast: false
    uses: ./.github/workflows/_app-quality-gate.yml
    with:
      app: ${{ matrix.app }}
      run-id: ${{ github.event.workflow_run.id }}
    secrets: inherit

name: Build

on:
  pull_request:
    paths:
      - 'apps/**'
      - 'common/**'
      - 'scripts/**'
      - 'Justfile'
      - 'ci/**'
      - 'bin/**'
      - '.github/actions/**'
      - '.github/workflows/_app-build.yml'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      apps:
        description: 'Comma-separated app names (or "all")'
        default: 'all'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  resolve:
    name: Resolve affected apps
    runs-on: ubuntu-latest
    outputs:
      apps: ${{ steps.compute.outputs.apps }}
      shared-images: ${{ steps.compute.outputs.shared-images }}
      shared-needed: ${{ steps.compute.outputs.shared-needed }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - id: compute
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || '' }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          APPS_INPUT: ${{ inputs.apps || 'all' }}
        run: ./scripts/resolve-affected-apps "$BASE_SHA" "$HEAD_SHA" "$APPS_INPUT"
      - name: Write affected-apps artifact
        env:
          APPS_JSON: ${{ steps.compute.outputs.apps }}
        run: printf '%s' "$APPS_JSON" > affected-apps.json
      - name: Upload affected-apps artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: affected-apps
          path: affected-apps.json
          if-no-files-found: error

  shared-images:
    name: Build shared ${{ matrix.spec.image }}
    needs: resolve
    if: ${{ needs.resolve.outputs.shared-needed == 'true' }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        spec: ${{ fromJSON(needs.resolve.outputs.shared-images) }}
      fail-fast: false
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-pipeline
        with:
          dhi-username: ${{ vars.DHI_USERNAME }}
          dhi-token: ${{ secrets.DHI_TOKEN }}
          ghcr-login: true
          ghcr-username: ${{ github.actor }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}
          cache-key: _shared-${{ matrix.spec.image }}

      - name: Compute SHA7
        id: sha
        run: |
          SHA7="${{ github.event.pull_request.head.sha || github.sha }}"
          echo "sha7=${SHA7:0:7}" >> "$GITHUB_OUTPUT"

      - name: Build, push, sign, attest
        uses: ./.github/actions/build-image-and-attest
        with:
          # The just chain reads apps/${app}/app-images.yaml; the resolver
          # picks one real consumer per shared image so the lookup resolves.
          app: ${{ matrix.spec.app }}
          image: ${{ matrix.spec.image }}
          sha7: ${{ steps.sha.outputs.sha7 }}
          push_handoff: 'true'

  app-builds:
    name: Build ${{ matrix.app }}
    # !failure() && !cancelled() lets this run when shared-images is skipped
    # (no shared images needed) but still blocks on a real shared-images failure.
    needs: [resolve, shared-images]
    if: ${{ !failure() && !cancelled() && needs.resolve.outputs.apps != '[]' }}
    strategy:
      matrix:
        app: ${{ fromJSON(needs.resolve.outputs.apps) }}
      fail-fast: false
    uses: ./.github/workflows/_app-build.yml
    with:
      app: ${{ matrix.app }}
    secrets: inherit

name: Build

on:
  pull_request:
    paths:
      - 'common/**'
      - 'apps/**'
      - 'common/tool-images.yaml'
      - 'apps/sbomify/app-images.yaml'
      - '.github/workflows/build.yml'
      - 'scripts/**'
      - 'Justfile'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  stock-dhi-images:
    name: Extract DHI attestations
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-pipeline
        with:
          dhi-username: ${{ vars.DHI_USERNAME }}
          dhi-token: ${{ secrets.DHI_TOKEN }}

      - name: Extract attestations
        run: just extract-dhi-attestations

      - name: Upload attestation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stock-dhi-attestations
          path: .artifacts/

      - name: Upload lock files
        uses: actions/upload-artifact@v4
        with:
          name: image-lock-files
          path: |
            common/tool-images.lock.yaml
            apps/sbomify/app-images.lock.yaml

  custom-dhi-builds:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - hugo
          - minio
          - sbomify-app
    steps:
      - uses: ./.github/actions/setup-pipeline
        with:
          dhi-username: ${{ vars.DHI_USERNAME }}
          dhi-token: ${{ secrets.DHI_TOKEN }}
          ghcr-login: true
          ghcr-username: ${{ github.actor }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        run: just build ${{ matrix.image }}

      - name: Scan image
        run: just scan ${{ matrix.image }}

      - name: Generate SPDX SBOM
        run: just sbom-spdx ${{ matrix.image }}

      - name: Upload attestation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: custom-${{ matrix.image }}-attestations
          path: .artifacts/${{ matrix.image }}/

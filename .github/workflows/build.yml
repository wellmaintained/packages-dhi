name: Build

on:
  pull_request:
    paths:
      - 'common/**'
      - 'apps/**'
      - '.github/workflows/build.yml'
      - 'scripts/**'
      - 'Justfile'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  resolve-images:
    name: Resolve image lists
    runs-on: blacksmith-2vcpu-ubuntu-2204
    outputs:
      custom-images: ${{ steps.images.outputs.custom }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: images
        run: echo "custom=$(./scripts/list-custom-images)" >> "$GITHUB_OUTPUT"

  stock-dhi-images:
    name: Extract DHI attestations
    runs-on: blacksmith-2vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-pipeline
        with:
          dhi-username: ${{ vars.DHI_USERNAME }}
          dhi-token: ${{ secrets.DHI_TOKEN }}

      - name: Extract attestations
        run: just extract-dhi-attestations

      - name: Upload attestation artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: stock-dhi-attestations
          path: artifacts/

  custom-dhi-builds:
    name: Build ${{ matrix.image }}
    needs: resolve-images
    runs-on: blacksmith-2vcpu-ubuntu-2204
    strategy:
      matrix:
        image: ${{ fromJSON(needs.resolve-images.outputs.custom-images) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-pipeline
        with:
          dhi-username: ${{ vars.DHI_USERNAME }}
          dhi-token: ${{ secrets.DHI_TOKEN }}
          ghcr-login: true
          ghcr-username: ${{ github.actor }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image and generate compliance artifacts
        run: just ci build ${{ matrix.image }}

      - name: Compute component tag
        id: tag
        run: |
          SHA7="${{ github.event.pull_request.head.sha || github.sha }}"
          SHA7="${SHA7::7}"
          IMAGE="${{ matrix.image }}"
          DEF=$(yq -r ".\"${IMAGE}\".definition | select(. != null)" apps/sbomify/app-images.yaml)
          VERSION=$(grep -oP 'git\+https://[^#]+#\K[^"]+' "$DEF" 2>/dev/null | head -1 || echo "unknown")
          COMPONENT_TAG="${IMAGE}-${VERSION}-${SHA7}"
          REG=$(just _image-registry "$IMAGE")
          echo "component_tag=${COMPONENT_TAG}" >> "$GITHUB_OUTPUT"
          echo "registry=${REG}" >> "$GITHUB_OUTPUT"
          echo "==> Component tag: ${COMPONENT_TAG}"

      - name: Push to GHCR with component tag
        run: |
          docker tag "${{ steps.tag.outputs.registry }}:dev" "${{ steps.tag.outputs.registry }}:${{ steps.tag.outputs.component_tag }}"
          docker push "${{ steps.tag.outputs.registry }}:${{ steps.tag.outputs.component_tag }}"

      - name: Sign image
        run: ./bin/cosign sign --yes "${{ steps.tag.outputs.registry }}:${{ steps.tag.outputs.component_tag }}"

      - name: Attest SBOM
        run: |
          ./bin/cosign attest --yes --type cyclonedx \
            --predicate "artifacts/${{ matrix.image }}/sbom.cdx.json" \
            "${{ steps.tag.outputs.registry }}:${{ steps.tag.outputs.component_tag }}"

      - name: Attest provenance
        run: |
          ./bin/cosign attest --yes --type slsaprovenance \
            --predicate "artifacts/${{ matrix.image }}/provenance.slsa.json" \
            "${{ steps.tag.outputs.registry }}:${{ steps.tag.outputs.component_tag }}"

      - name: Upload attestation artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: custom-${{ matrix.image }}-attestations
          path: artifacts/${{ matrix.image }}/

name: Build

on:
  pull_request:
    paths:
      - 'common/**'
      - 'apps/**'
      - '.github/image-manifest.json'
      - '.github/workflows/build.yml'
      - 'scripts/**'
      - 'Justfile'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  stock-dhi-images:
    name: Extract DHI attestations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Login to dhi.io
        run: echo "${{ secrets.DHI_TOKEN }}" | docker login dhi.io -u "${{ secrets.DHI_USERNAME }}" --password-stdin

      - name: Extract attestations
        run: just extract-dhi-attestations

      - name: Upload attestation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stock-dhi-attestations
          path: .artifacts/

      - name: Upload updated manifest
        uses: actions/upload-artifact@v4
        with:
          name: image-manifest
          path: .github/image-manifest.json

  custom-dhi-builds:
    name: Build ${{ matrix.image }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image:
          - minio
          - minio-init
          - sbomify-app
    steps:
      - uses: actions/checkout@v4

      - name: Install just
        uses: extractions/setup-just@v2

      - name: Login to dhi.io
        run: echo "${{ secrets.DHI_TOKEN }}" | docker login dhi.io -u "${{ secrets.DHI_USERNAME }}" --password-stdin

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Build image
        run: just build ${{ matrix.image }}

      - name: Scan image
        run: just scan ${{ matrix.image }}

      - name: Generate SPDX SBOM
        run: just sbom-spdx ${{ matrix.image }}

      - name: Upload attestation artifacts
        uses: actions/upload-artifact@v4
        with:
          name: custom-${{ matrix.image }}-attestations
          path: .artifacts/${{ matrix.image }}/

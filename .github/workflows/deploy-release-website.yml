name: Deploy Release Website

on:
  release:
    types: [released]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  pages: write
  id-token: write

jobs:
  tag-released:
    name: Tag released images
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-pipeline
        with:
          dhi-username: ${{ vars.DHI_USERNAME }}
          dhi-token: ${{ secrets.DHI_TOKEN }}
          ghcr-login: true
          ghcr-username: ${{ github.actor }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add released-on tags
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%dT%H:%M:%SZ')
          TAG="${{ github.event.release.tag_name }}"

          # Fetch release body safely via API (avoids shell escaping issues)
          gh release view "$TAG" --json body --jq '.body' | \
            grep '^|' | grep -v '^\|.*---' | grep -v '^\| Image' | \
            while IFS='|' read -r _ name _ digest _; do
              name=$(echo "$name" | xargs | tr -d '`')
              digest=$(echo "$digest" | xargs | tr -d '`')
              [ -z "$name" ] && continue

              REG=$(just _image-registry "$name" 2>/dev/null || true)
              [ -z "$REG" ] && continue

              echo "==> Tagging ${name} with released-on:${TIMESTAMP}"
              ./bin/crane tag "${REG}@${digest}" "released-on:${TIMESTAMP}" || \
                echo "WARNING: Failed to tag ${name}"
            done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Build and deploy website
    needs: [tag-released]
    if: always() && (needs.tag-released.result == 'success' || needs.tag-released.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-pipeline
        with:
          dhi-username: ${{ vars.DHI_USERNAME }}
          dhi-token: ${{ secrets.DHI_TOKEN }}

      - name: Download compliance pack from release
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          gh release download "$TAG" \
            --pattern "compliance-pack-*.zip" \
            --dir /tmp/
          mkdir -p .artifacts
          unzip -o /tmp/compliance-pack-*.zip -d .artifacts/ || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract stock DHI attestations (fallback)
        run: |
          if [ ! -d ".artifacts/postgres" ]; then
            just extract-dhi-attestations
          fi

      - name: Build release website
        run: just release-website

      - name: Setup Pages
        uses: actions/configure-pages@1f0c5cde4bc74cd7e1254d0cb4de8d49e9068c7d # v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: apps/sbomify/release-website/public

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

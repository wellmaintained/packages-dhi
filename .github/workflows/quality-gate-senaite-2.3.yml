name: SBOM Quality Gate senaite-2.3

on:
  workflow_run:
    workflows: ['Build senaite-2.3']
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  gate:
    if: github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/_app-quality-gate.yml
    with:
      app: senaite-2.3
      run-id: ${{ github.event.workflow_run.id }}
    secrets: inherit

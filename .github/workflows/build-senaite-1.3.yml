name: Build senaite-1.3

on:
  pull_request:
    paths:
      - 'apps/senaite-1.3/**'
      - 'common/**'
      - 'scripts/**'
      - 'Justfile'
      - 'ci/**'
      - 'bin/**'
      - '.github/workflows/_app-build.yml'
      - '.github/workflows/build-senaite-1.3.yml'
      - '.github/actions/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    uses: ./.github/workflows/_app-build.yml
    with:
      app: senaite-1.3
    secrets: inherit

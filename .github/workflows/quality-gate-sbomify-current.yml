name: SBOM Quality Gate sbomify-current

on:
  workflow_run:
    workflows: ['Build sbomify-current']
    types: [completed]

permissions:
  contents: read
  pull-requests: write
  actions: read

jobs:
  gate:
    if: github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/_app-quality-gate.yml
    with:
      app: sbomify-current
      run-id: ${{ github.event.workflow_run.id }}
    secrets: inherit

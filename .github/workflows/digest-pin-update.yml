name: Update DHI Digest Pins

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-digests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-pipeline
        with:
          dhi-username: ${{ vars.DHI_USERNAME }}
          dhi-token: ${{ secrets.DHI_TOKEN }}

      - name: Save current lock file
        run: cp apps/sbomify-current/app-images.lock.yaml /tmp/app-images-before.lock.yaml

      - name: Pin latest digests
        run: just update

      - name: Check for changes
        id: diff
        run: |
          changed=false
          if ! diff -q apps/sbomify-current/app-images.lock.yaml /tmp/app-images-before.lock.yaml > /dev/null 2>&1; then
            changed=true
            echo "App image changes:"
            diff /tmp/app-images-before.lock.yaml apps/sbomify-current/app-images.lock.yaml || true
          fi
          echo "changed=${changed}" >> "$GITHUB_OUTPUT"

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          branch="update-dhi-digests-$(date +%Y%m%d)"
          git checkout -b "$branch"
          git add apps/sbomify-current/app-images.yaml apps/sbomify-current/app-images.lock.yaml
          git commit -m "chore: update stock image digest pins"
          git push -u origin HEAD
          gh pr create \
            --title "Update stock image digest pins" \
            --body "$(cat <<'PREOF'
          ## Summary
          - Weekly digest pin update detected new stock image versions
          - Quality gate will validate the updated images

          ## Changes
          $(diff /tmp/app-images-before.lock.yaml apps/sbomify-current/app-images.lock.yaml || true)
          PREOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

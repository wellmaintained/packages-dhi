name: Update DHI Digest Pins

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-digests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-pipeline
        with:
          dhi-username: ${{ vars.DHI_USERNAME }}
          dhi-token: ${{ secrets.DHI_TOKEN }}

      - name: Discover apps
        id: apps
        run: |
          APPS=$(./scripts/list-apps | jq -r '.[]' | tr '\n' ' ')
          echo "APPS=$APPS" >> "$GITHUB_ENV"
          echo "list=$APPS" >> "$GITHUB_OUTPUT"

      - name: Snapshot current lock files
        run: |
          mkdir -p /tmp/before
          for app in $APPS; do
            lock="apps/${app}/app-images.lock.yaml"
            if [ -f "$lock" ]; then
              cp "$lock" "/tmp/before/${app}.lock.yaml"
            fi
          done

      - name: Update tool versions
        run: just update-tools

      - name: Pin latest digests for every app
        run: |
          for app in $APPS; do
            echo "=== Updating ${app} ==="
            APP=$app just update-app-images
          done

      - name: Lint YAML
        run: just lint-yaml

      - name: Check for changes
        id: diff
        run: |
          changed=false
          changed_apps=()
          for app in $APPS; do
            lock="apps/${app}/app-images.lock.yaml"
            before="/tmp/before/${app}.lock.yaml"
            if [ ! -f "$before" ] && [ -f "$lock" ]; then
              echo "==> ${app}: new lock file"
              changed=true
              changed_apps+=("$app")
            elif [ -f "$before" ] && ! diff -q "$lock" "$before" > /dev/null 2>&1; then
              echo "==> ${app}: lock changed"
              diff "$before" "$lock" || true
              changed=true
              changed_apps+=("$app")
            fi
          done
          echo "changed=${changed}" >> "$GITHUB_OUTPUT"
          echo "apps=${changed_apps[*]}" >> "$GITHUB_OUTPUT"

      - name: Create PR
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          branch="update-dhi-digests-$(date +%Y%m%d)"
          git checkout -b "$branch"
          for app in $APPS; do
            lock="apps/${app}/app-images.lock.yaml"
            manifest="apps/${app}/app-images.yaml"
            [ -f "$lock" ] || continue
            git add "$manifest" "$lock"
          done
          [ -f common/tool-versions.lock.yaml ] && git add common/tool-versions.lock.yaml
          git commit -m "chore: update digest pins (${{ steps.diff.outputs.apps }})"
          git push -u origin HEAD
          gh pr create \
            --title "Update stock image digest pins" \
            --body "$(cat <<EOF
          ## Summary
          - Weekly digest pin update detected new stock image versions
          - Apps affected: ${{ steps.diff.outputs.apps }}
          - Quality gate will validate the updated images
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Rescan Vulnerabilities

on:
  schedule:
    - cron: '0 6 * * 1'  # Weekly, Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rescan:
    runs-on: ubuntu-latest
    steps:
      - uses: ./.github/actions/setup-pipeline
        with:
          dhi-username: ${{ vars.DHI_USERNAME }}
          dhi-token: ${{ secrets.DHI_TOKEN }}

      - name: Extract DHI attestations (includes CVE scan)
        run: just extract-dhi-attestations

      - name: Scan custom images
        run: |
          for image in minio sbomify-app; do
            echo "=== Scanning ${image} ==="
            reg=$(just _image-registry "$image")
            ./bin/grype "${reg}:latest" -o table || true
          done

      - name: Upload scan results
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-rescan-$(date +%Y%m%d)
          path: .artifacts/

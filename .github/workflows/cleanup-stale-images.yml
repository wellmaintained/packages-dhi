name: Cleanup Stale Images

on:
  schedule:
    - cron: '0 3 * * 0'  # Weekly, Sunday 03:00 UTC
  workflow_dispatch:

permissions:
  packages: write

jobs:
  resolve:
    name: Resolve (app, image) pairs
    runs-on: ubuntu-latest
    outputs:
      pairs: ${{ steps.pairs.outputs.pairs }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: pairs
        run: echo "pairs=$(./scripts/list-app-image-pairs)" >> "$GITHUB_OUTPUT"

  cleanup:
    name: Clean ${{ matrix.app }}/${{ matrix.image }}
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include: ${{ fromJSON(needs.resolve.outputs.pairs) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Sweep stale images
        run: ./scripts/cleanup-stale-images sweep --image "${{ matrix.image }}" --prefix packages-dhi --days 7
        env:
          APP: ${{ matrix.app }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

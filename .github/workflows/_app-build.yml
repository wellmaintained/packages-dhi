name: _app-build

on:
  workflow_call:
    inputs:
      app:
        description: 'App name under apps/ (e.g. sbomify-current, senaite-current)'
        required: true
        type: string

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  resolve-images:
    name: Resolve image lists (${{ inputs.app }})
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.images.outputs.shared }}
      local: ${{ steps.images.outputs.local }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - id: images
        env:
          APP: ${{ inputs.app }}
        run: |
          SHARED=$(./scripts/list-shared-images)
          LOCAL=$(yq -o=json -I0 '
            [to_entries[]
             | select(.value | has("definition"))
             | select(.value.definition | test("^common/images/") | not)
             | .key]
          ' "apps/${APP}/app-images.yaml")
          {
            echo "shared=${SHARED}"
            echo "local=${LOCAL}"
          } >> "$GITHUB_OUTPUT"

  stock-dhi-images:
    name: Extract DHI attestations (${{ inputs.app }})
    runs-on: ubuntu-latest
    env:
      APP: ${{ inputs.app }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-pipeline
        with:
          dhi-username: ${{ vars.DHI_USERNAME }}
          dhi-token: ${{ secrets.DHI_TOKEN }}
          cache-key: ${{ inputs.app }}-stock

      - name: Extract attestations
        run: just extract-dhi-attestations

      - name: Upload attestation artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: stock-dhi-attestations-${{ inputs.app }}
          path: artifacts/

  shared-images:
    name: Build shared ${{ inputs.app }}/${{ matrix.image }}
    needs: resolve-images
    if: ${{ needs.resolve-images.outputs.shared != '[]' }}
    runs-on: ubuntu-latest
    env:
      APP: ${{ inputs.app }}
    strategy:
      matrix:
        image: ${{ fromJSON(needs.resolve-images.outputs.shared) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-pipeline
        with:
          dhi-username: ${{ vars.DHI_USERNAME }}
          dhi-token: ${{ secrets.DHI_TOKEN }}
          ghcr-login: true
          ghcr-username: ${{ github.actor }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}
          cache-key: ${{ inputs.app }}-${{ matrix.image }}

      - name: Build image and generate compliance artifacts
        run: just ci build ${{ matrix.image }}

      - name: Compute component tag
        id: tag
        run: |
          SHA7="${{ github.event.pull_request.head.sha || github.sha }}"
          SHA7="${SHA7:0:7}"
          COMPONENT_TAG=$(just ci _component-tag "${{ matrix.image }}" "$SHA7")
          REG=$(just ci _image-registry "${{ matrix.image }}")
          echo "component_tag=${COMPONENT_TAG}" >> "$GITHUB_OUTPUT"
          echo "registry=${REG}" >> "$GITHUB_OUTPUT"
          echo "==> Component tag: ${COMPONENT_TAG}"

      # Push :dev so downstream per-app builds (custom-dhi-builds) can resolve
      # `uses: <registry>:dev` directives in their DHI definitions.
      - name: Push :dev tag for downstream builds
        run: docker push "${{ steps.tag.outputs.registry }}:dev"

      - name: Push to GHCR with component tag
        run: |
          docker tag "${{ steps.tag.outputs.registry }}:dev" "${{ steps.tag.outputs.registry }}:${{ steps.tag.outputs.component_tag }}"
          docker push "${{ steps.tag.outputs.registry }}:${{ steps.tag.outputs.component_tag }}"

      - name: Sign image
        run: ./bin/cosign sign --yes "${{ steps.tag.outputs.registry }}:${{ steps.tag.outputs.component_tag }}"

      - name: Attest SBOM
        run: |
          ./bin/cosign attest --yes --type cyclonedx \
            --predicate "artifacts/${{ matrix.image }}/sbom.cdx.json" \
            "${{ steps.tag.outputs.registry }}:${{ steps.tag.outputs.component_tag }}"

      - name: Attest provenance
        run: |
          ./bin/cosign attest --yes --type slsaprovenance \
            --predicate "artifacts/${{ matrix.image }}/provenance.slsa.json" \
            "${{ steps.tag.outputs.registry }}:${{ steps.tag.outputs.component_tag }}"

      - name: Upload attestation artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: custom-${{ inputs.app }}-${{ matrix.image }}-attestations
          path: artifacts/${{ matrix.image }}/

  custom-dhi-builds:
    name: Build ${{ inputs.app }}/${{ matrix.image }}
    needs: [resolve-images, shared-images]
    # !failure() && !cancelled() lets this run even when shared-images is
    # skipped (apps with no shared images); a real shared-images failure
    # still blocks per the failure() check.
    if: ${{ !failure() && !cancelled() && needs.resolve-images.outputs.local != '[]' }}
    runs-on: ubuntu-latest
    env:
      APP: ${{ inputs.app }}
    strategy:
      matrix:
        image: ${{ fromJSON(needs.resolve-images.outputs.local) }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: ./.github/actions/setup-pipeline
        with:
          dhi-username: ${{ vars.DHI_USERNAME }}
          dhi-token: ${{ secrets.DHI_TOKEN }}
          ghcr-login: true
          ghcr-username: ${{ github.actor }}
          ghcr-token: ${{ secrets.GITHUB_TOKEN }}
          cache-key: ${{ inputs.app }}-${{ matrix.image }}

      - name: Build image and generate compliance artifacts
        run: just ci build ${{ matrix.image }}

      - name: Compute component tag
        id: tag
        run: |
          SHA7="${{ github.event.pull_request.head.sha || github.sha }}"
          SHA7="${SHA7:0:7}"
          COMPONENT_TAG=$(just ci _component-tag "${{ matrix.image }}" "$SHA7")
          REG=$(just ci _image-registry "${{ matrix.image }}")
          echo "component_tag=${COMPONENT_TAG}" >> "$GITHUB_OUTPUT"
          echo "registry=${REG}" >> "$GITHUB_OUTPUT"
          echo "==> Component tag: ${COMPONENT_TAG}"

      - name: Push to GHCR with component tag
        run: |
          docker tag "${{ steps.tag.outputs.registry }}:dev" "${{ steps.tag.outputs.registry }}:${{ steps.tag.outputs.component_tag }}"
          docker push "${{ steps.tag.outputs.registry }}:${{ steps.tag.outputs.component_tag }}"

      - name: Sign image
        run: ./bin/cosign sign --yes "${{ steps.tag.outputs.registry }}:${{ steps.tag.outputs.component_tag }}"

      - name: Attest SBOM
        run: |
          ./bin/cosign attest --yes --type cyclonedx \
            --predicate "artifacts/${{ matrix.image }}/sbom.cdx.json" \
            "${{ steps.tag.outputs.registry }}:${{ steps.tag.outputs.component_tag }}"

      - name: Attest provenance
        run: |
          ./bin/cosign attest --yes --type slsaprovenance \
            --predicate "artifacts/${{ matrix.image }}/provenance.slsa.json" \
            "${{ steps.tag.outputs.registry }}:${{ steps.tag.outputs.component_tag }}"

      - name: Upload attestation artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: custom-${{ inputs.app }}-${{ matrix.image }}-attestations
          path: artifacts/${{ matrix.image }}/
